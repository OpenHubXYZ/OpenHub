name: Bug report
description: Report a reproducible bug.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include private skill contents, tokens, or sensitive local paths.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide minimal steps.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - repository foundation
        - desktop shell
        - SQLite
        - agent adapters
        - import/export
        - install/uninstall
        - security
        - sync
        - plugins
        - packaging
        - docs
    validations:
      required: true
