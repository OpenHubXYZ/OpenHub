<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TheOpenHub Page Mockups</title>
    <style>
      :root {
        --blue: #1677f2;
        --blue-50: #eef5ff;
        --cyan: #24a6b8;
        --green: #11a35a;
        --green-50: #eaf8f0;
        --amber: #f6b800;
        --amber-50: #fff5d6;
        --red: #eb5757;
        --red-50: #fff0ee;
        --text: #111827;
        --muted: #5f6b7a;
        --soft: #8a95a5;
        --line: #d9dee7;
        --line-strong: #c8d4e5;
        --surface: #ffffff;
        --page: #fbfcfe;
        --sidebar-active: #eaf2ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #eef1f6;
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        letter-spacing: 0;
      }

      .screen {
        display: grid;
        grid-template-columns: 225px 1fr;
        width: 1487px;
        height: 1058px;
        overflow: hidden;
        background: var(--page);
      }

      .sidebar {
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 28px;
        padding: 24px 14px 18px;
        border-right: 1px solid var(--line);
        background: linear-gradient(90deg, #ffffff 0%, #f8fbff 100%);
      }

      .brand {
        display: grid;
        grid-template-columns: 40px 1fr;
        gap: 9px;
        align-items: center;
        padding: 0 4px;
      }

      .brand-cube {
        position: relative;
        width: 36px;
        height: 36px;
        border: 4px solid #2da8f3;
        border-radius: 4px;
        transform: rotate(30deg) skew(-8deg);
      }

      .brand-cube::after {
        position: absolute;
        inset: 7px;
        border: 3px solid #2da8f3;
        border-radius: 2px;
        content: "";
      }

      .brand-title {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        font-weight: 760;
        line-height: 1.1;
      }

      .brand-subtitle {
        margin-top: 4px;
        color: #1f2937;
        font-size: 13px;
        font-weight: 650;
      }

      .version-pill {
        padding: 2px 6px;
        border-radius: 6px;
        color: var(--blue);
        background: var(--blue-50);
        font-size: 11px;
        font-weight: 700;
      }

      .nav {
        display: grid;
        align-content: start;
        gap: 6px;
        padding-top: 16px;
      }

      .nav-item {
        display: grid;
        grid-template-columns: 25px 1fr;
        align-items: center;
        gap: 10px;
        min-height: 40px;
        padding: 0 10px;
        border-radius: 8px;
        color: #202938;
        font-size: 15px;
        font-weight: 560;
      }

      .nav-item.active {
        position: relative;
        color: var(--blue);
        background: var(--sidebar-active);
        font-weight: 700;
      }

      .nav-item.active::before {
        position: absolute;
        left: 0;
        width: 3px;
        height: 21px;
        border-radius: 4px;
        background: var(--blue);
        content: "";
      }

      .nav-icon,
      .small-icon,
      .toolbar-icon {
        display: grid;
        place-items: center;
        color: currentColor;
      }

      .nav-icon svg,
      .small-icon svg,
      .toolbar-icon svg {
        width: 18px;
        height: 18px;
        stroke-width: 1.9;
      }

      .sidebar-foot {
        display: grid;
        gap: 18px;
        padding: 0 10px;
      }

      .foot-line {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #2f3948;
        font-size: 13px;
        font-weight: 600;
      }

      .app {
        display: grid;
        grid-template-rows: 77px 1fr 58px;
        min-width: 0;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(420px, 1fr) 1px auto auto auto auto;
        gap: 12px;
        align-items: center;
        padding: 17px 26px 16px 21px;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }

      .search {
        display: grid;
        grid-template-columns: 26px 1fr auto;
        align-items: center;
        height: 43px;
        padding: 0 12px;
        border: 1px solid #cfd6e3;
        border-radius: 6px;
        color: var(--soft);
        background: #ffffff;
        box-shadow: inset 0 1px 0 rgb(0 0 0 / 2%);
      }

      .search span:nth-child(2) {
        color: #6a7280;
        font-size: 14px;
      }

      .divider {
        height: 36px;
        background: var(--line);
      }

      .control,
      .primary,
      .icon-btn {
        display: inline-grid;
        align-items: center;
        justify-content: center;
        height: 42px;
        border-radius: 7px;
        font-weight: 650;
      }

      .control {
        grid-auto-flow: column;
        gap: 9px;
        min-width: 105px;
        padding: 0 13px;
        border: 1px solid #cfd6e3;
        color: #202938;
        background: #ffffff;
      }

      .control.offline {
        min-width: 136px;
        grid-template-columns: auto 1fr auto;
        justify-items: start;
      }

      .dot {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: var(--green);
      }

      .control small {
        display: block;
        color: #6a7280;
        font-size: 12px;
        font-weight: 560;
        line-height: 1.1;
      }

      .primary {
        grid-auto-flow: column;
        gap: 8px;
        min-width: 144px;
        padding: 0 16px;
        border: 0;
        color: #ffffff;
        background: var(--blue);
      }

      .icon-btn {
        width: 44px;
        border: 1px solid #cfd6e3;
        color: #202938;
        background: #ffffff;
      }

      .content {
        min-height: 0;
        overflow: hidden;
      }

      .workbench {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 376px;
        height: 100%;
        min-height: 0;
      }

      .main-pane {
        min-width: 0;
        overflow: hidden;
        border-right: 1px solid var(--line);
      }

      .main-pad {
        padding: 22px 16px 18px;
      }

      .right-pane {
        overflow: hidden;
        padding: 18px 14px;
        background: #ffffff;
      }

      .page-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .page-title h1 {
        margin: 0;
        color: #121926;
        font-size: 22px;
        font-weight: 760;
        letter-spacing: 0;
        line-height: 1.2;
      }

      .page-title p {
        margin: 4px 0 0;
        color: #6b7280;
        font-size: 13px;
        font-weight: 560;
      }

      .sub-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .tabs {
        display: flex;
        align-items: center;
        gap: 28px;
        min-height: 49px;
        padding: 0 16px;
        border-bottom: 1px solid var(--line);
        background: #ffffff;
      }

      .tab {
        position: relative;
        color: #1f2937;
        font-size: 14px;
        font-weight: 650;
      }

      .tab.active {
        color: var(--blue);
      }

      .tab.active::after {
        position: absolute;
        right: 0;
        bottom: -16px;
        left: 0;
        height: 3px;
        border-radius: 3px;
        background: var(--blue);
        content: "";
      }

      .badge {
        display: inline-grid;
        place-items: center;
        min-width: 22px;
        height: 22px;
        margin-left: 7px;
        padding: 0 7px;
        border-radius: 999px;
        color: #384152;
        background: #eef0f4;
        font-size: 12px;
        font-weight: 740;
      }

      .filters {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 15px 16px;
        border-bottom: 1px solid var(--line);
        background: #ffffff;
      }

      .filter {
        display: inline-grid;
        grid-auto-flow: column;
        align-items: center;
        gap: 12px;
        height: 34px;
        padding: 0 12px;
        border: 1px solid #d4dae4;
        border-radius: 6px;
        color: #1f2937;
        background: #ffffff;
        font-size: 13px;
        font-weight: 560;
      }

      .filter strong {
        color: #2f3948;
        font-weight: 650;
      }

      .filter.muted {
        color: #4b5563;
      }

      .filter.blue {
        border-color: #bdd7ff;
        color: var(--blue);
        background: var(--blue-50);
      }

      .spacer {
        flex: 1;
      }

      .table-caption {
        padding: 0 16px 12px;
        color: #4b5563;
        font-size: 13px;
        font-weight: 560;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        background: #ffffff;
      }

      th,
      td {
        overflow: hidden;
        padding: 13px 10px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        text-overflow: ellipsis;
        vertical-align: middle;
        white-space: nowrap;
      }

      th {
        color: #303947;
        font-size: 12px;
        font-weight: 700;
      }

      td {
        color: #17202f;
        font-size: 12px;
        font-weight: 560;
      }

      tr.selected td {
        border-top: 1px solid #bdd7ff;
        border-bottom: 1px solid #bdd7ff;
        background: #f1f7ff;
      }

      .row-title {
        display: grid;
        grid-template-columns: 26px 1fr;
        gap: 9px;
        align-items: center;
        min-width: 0;
      }

      .avatar {
        display: grid;
        place-items: center;
        width: 26px;
        height: 26px;
        border-radius: 7px;
        color: #ffffff;
        background: var(--cyan);
        font-size: 12px;
        font-weight: 800;
      }

      .avatar.dark {
        background: #111827;
      }

      .avatar.blue {
        background: #287ee6;
      }

      .avatar.green {
        background: #19a95f;
      }

      .row-title strong,
      .stack strong {
        display: block;
        color: #151b26;
        font-weight: 760;
        line-height: 1.2;
      }

      .row-title small,
      .stack small {
        display: block;
        margin-top: 3px;
        color: #6b7280;
        font-size: 11px;
        font-weight: 600;
      }

      .tag {
        display: inline-grid;
        place-items: center;
        min-height: 22px;
        padding: 0 7px;
        border: 1px solid #dce2ea;
        border-radius: 5px;
        color: #384152;
        background: #fbfcfe;
        font-size: 11px;
        font-weight: 650;
      }

      .risk,
      .status {
        display: inline-grid;
        place-items: center;
        min-height: 24px;
        padding: 0 9px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 760;
      }

      .low {
        color: #137548;
        background: var(--green-50);
      }

      .medium {
        color: #8a5b00;
        background: var(--amber-50);
      }

      .high {
        color: #c24135;
        background: var(--red-50);
      }

      .neutral {
        color: #4b5563;
        background: #eef0f4;
      }

      .stars {
        color: #f5ad00;
        font-size: 13px;
        letter-spacing: 1px;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .card,
      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
      }

      .card {
        display: grid;
        gap: 13px;
        min-height: 176px;
        padding: 14px;
      }

      .card header,
      .panel header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .card h2,
      .panel h2,
      .rail-card h2 {
        margin: 0;
        color: #151b26;
        font-size: 15px;
        font-weight: 760;
        line-height: 1.2;
      }

      .card p,
      .panel p,
      .rail-card p {
        margin: 0;
        color: #586272;
        font-size: 12px;
        line-height: 1.45;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 14px;
      }

      .metric {
        display: grid;
        gap: 7px;
        min-height: 98px;
        padding: 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
      }

      .metric span {
        color: #667085;
        font-size: 12px;
        font-weight: 700;
      }

      .metric strong {
        color: #151b26;
        font-size: 25px;
        font-weight: 780;
        line-height: 1;
      }

      .metric small {
        color: #137548;
        font-size: 12px;
        font-weight: 700;
      }

      .section-grid {
        display: grid;
        grid-template-columns: 1.25fr 0.75fr;
        gap: 14px;
      }

      .panel {
        padding: 14px;
      }

      .panel + .panel {
        margin-top: 14px;
      }

      .list {
        display: grid;
        gap: 0;
        margin: 12px 0 0;
        padding: 0;
      }

      .list li {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 12px;
        min-height: 40px;
        border-top: 1px solid #edf0f4;
        list-style: none;
      }

      .list span {
        overflow: hidden;
        color: #303947;
        font-size: 12px;
        font-weight: 630;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .list strong {
        color: #151b26;
        font-size: 12px;
        font-weight: 760;
      }

      .bar-chart {
        display: flex;
        align-items: end;
        gap: 7px;
        height: 164px;
        margin-top: 14px;
        padding: 10px 4px 0;
        border-top: 1px solid #edf0f4;
      }

      .bar {
        width: 13px;
        border-radius: 3px 3px 0 0;
        background: #6aa8ff;
      }

      .bar.alt {
        background: #9dd6c0;
      }

      .bar.warn {
        background: #ffd56a;
      }

      .rail-head {
        display: grid;
        grid-template-columns: 42px 1fr auto;
        gap: 11px;
        align-items: center;
        margin-bottom: 14px;
      }

      .rail-icon {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 9px;
        color: #ffffff;
        background: linear-gradient(135deg, #27a6b9, #238d9f);
        font-size: 18px;
        font-weight: 800;
      }

      .rail-title h2 {
        margin: 0;
        color: #111827;
        font-size: 16px;
        font-weight: 780;
      }

      .rail-title p {
        margin: 3px 0 0;
        color: #6b7280;
        font-size: 12px;
        font-weight: 600;
      }

      .rail-card {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
      }

      .rail-card + .rail-card {
        margin-top: 10px;
      }

      .rail-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        min-height: 34px;
        border-top: 1px solid #edf0f4;
      }

      .rail-row:first-child {
        border-top: 0;
      }

      .rail-row span {
        overflow: hidden;
        color: #4b5563;
        font-size: 12px;
        font-weight: 620;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .rail-row strong {
        color: #151b26;
        font-size: 12px;
        font-weight: 760;
      }

      .split-two {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .path-box {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .path-row {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr) auto;
        gap: 9px;
        align-items: center;
        min-height: 48px;
        padding: 8px;
        border: 1px solid #e1e6ef;
        border-radius: 7px;
        background: #fbfcfe;
      }

      .path-row strong {
        overflow: hidden;
        color: #151b26;
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .path-row small {
        display: block;
        margin-top: 3px;
        overflow: hidden;
        color: #667085;
        font-size: 11px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .timeline {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      .event {
        display: grid;
        grid-template-columns: 20px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: start;
      }

      .event-dot {
        width: 8px;
        height: 8px;
        margin: 7px auto 0;
        border-radius: 50%;
        background: var(--blue);
      }

      .event strong {
        display: block;
        color: #151b26;
        font-size: 12px;
        font-weight: 760;
      }

      .event span {
        color: #667085;
        font-size: 11px;
        line-height: 1.35;
      }

      .heat {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 5px;
        margin-top: 13px;
      }

      .heat i {
        height: 21px;
        border-radius: 4px;
        background: #e7edf5;
      }

      .heat i:nth-child(3n) {
        background: #9dccff;
      }

      .heat i:nth-child(4n) {
        background: #56a0ff;
      }

      .heat i:nth-child(7n) {
        background: #b8e2d0;
      }

      .statusbar {
        display: grid;
        grid-template-columns: minmax(360px, 1fr) minmax(460px, auto) minmax(240px, 1fr);
        align-items: center;
        gap: 18px;
        padding: 0 19px;
        border-top: 1px solid var(--line);
        background: #ffffff;
        color: #344054;
        font-size: 12px;
        font-weight: 560;
      }

      .status-group {
        display: flex;
        align-items: center;
        gap: 18px;
        min-width: 0;
      }

      .status-item {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        white-space: nowrap;
      }

      .status-item.truncate {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .status-right {
        justify-content: flex-end;
      }

      .agent-dot {
        display: inline-grid;
        place-items: center;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        color: #ffffff;
        background: #111827;
        font-size: 10px;
        font-weight: 800;
      }

      .agent-dot.claude {
        background: #e66f4e;
      }

      .agent-dot.gemini {
        background: #4b83f1;
      }

      .agent-dot.open {
        color: #111827;
        border: 1px dashed #111827;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      const icon = {
        dashboard:
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 13h6V4H4v9Z"/><path d="M14 20h6V4h-6v16Z"/><path d="M4 20h6v-3H4v3Z"/></svg>',
        library:
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M7 4h13v16H7z"/><path d="M4 7h3"/><path d="M4 12h3"/><path d="M4 17h3"/></svg>',
        discover:
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></svg>',
        installs:
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 4h12v16H6z"/><path d="M9 12h6"/><path d="M12 9v6"/></svg>',
        usage:
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 20V10"/><path d="M12 20V4"/><path d="M19 20v-7"/></svg>',
        reviews:
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m12 3 3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1 3-6Z"/></svg>',
        security:
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3 5 6v6c0 5 3 8 7 10 4-2 7-5 7-10V6l-7-3Z"/><path d="m9 12 2 2 4-5"/></svg>',
        settings:
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.4 1a7 7 0 0 0-1.7-1L14.5 3h-5l-.3 3.1a7 7 0 0 0-1.7 1l-2.4-1-2 3.4L5.1 11a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.3 3.1h5l.3-3.1a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.5c.1-.3.1-.7.1-1Z"/></svg>',
        search:
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></svg>',
        chevron:
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m8 10 4 4 4-4"/></svg>',
        download:
